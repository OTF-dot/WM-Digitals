<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">


<title>

</title>


<link rel="stylesheet"
href="css/style.css">


<style>

.error-container {

    min-height: 100vh;

    display: flex;

    flex-direction: column;

    justify-content: center;

    align-items: center;

    text-align: center;

}


.error-number {

    font-size: clamp(6rem, 20vw, 12rem);

    color: var(--gold);

    text-shadow:
        0 0 25px var(--gold),
        0 0 60px var(--blue);

    animation:
        pulse 2.5s infinite;

}


@keyframes pulse {

    50% {

        transform: scale(1.05);

    }

}


.error-container p {

    max-width: 500px;

    margin: 20px 0 40px;

    color: #cccccc;

}


.button-group {

    display: flex;

    gap: 20px;

    flex-wrap: wrap;

}

</style>

</head>


<body>


<div class="error-container">


<h1 class="error-number">
404
</h1>


<h2>
WM Digitals
</h2>


<p>

The digital path you followed does not exist.

Let's get you back to building the future.

</p>


<div class="button-group">


<a href="index.html"
class="primary-btn">

Return Home

</a>


<a href="index.html#contact"
class="secondary-btn">

Contact Me

</a>


</div>


</div>


</body>

</html>
